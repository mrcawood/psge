# PSGE CI — pytest + CLI smoke test
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Lint (ruff)
        run: .venv/bin/ruff check src/ tests/

      - name: Run tests
        run: .venv/bin/pytest tests/ -v --tb=short

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and run smoke test
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"
          .venv/bin/psge run --variant R59W --structure-source predict_first --results-dir ./smoke_out

      - name: Verify outputs
        run: |
          test -f smoke_out/summary.json
          test -f smoke_out/report.md
          test -f smoke_out/run_manifest.json
          grep -q "mechanism_class" smoke_out/summary.json
