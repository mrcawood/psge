# Variant ↔ source evidence map (Phase 1.6e)

variants:
  R59W:
    psge_computed_evidence:
      - PDB_3NKS
      - FOLDX_5_3NKS
      - SASA_BIOPYTHON_3NKS
    external_evidence:
      - source_id: MEISSNER_1996_R59W
        claim_scope: direct_variant_evidence
        evidence_tier: functional_assay
        claim: "R59W has reported reduced PPO enzyme activity (Meissner et al. 1996)."
        confidence: source_supported
      - source_id: QIN_2011_R59W_MECHANISTIC
        claim_scope: mechanistic_inference
        evidence_tier: literature_mechanistic
        claim: >
          Qin et al. (2011) discuss R59W in the FAD/cofactor environment as a
          mechanistic hypothesis; not PSGE proof of mechanism.
        confidence: source_supported
    evidence_gap:
      - PSGE mechanism assignment remains a computational/structural hypothesis.
      - FoldX does not measure PPOX enzyme activity, FAD binding, inhibitor binding, catalysis, or clinical outcome.
      - 3NKS/FAD/ACJ proximity supports structural context only, not direct functional causation.
      - Clinical expression, penetrance, and symptom risk are out of scope.
      - FAD/active-site residue definitions remain provisional pending expert review.

