# PPOX evidence source registry (Phase 1.6e)
# Literature claims curated from project bibliography/reference notes unless noted.

sources:
  - source_id: PDB_3NKS
    title: "Human PPOX crystal structure with FAD and inhibitor ACJ (PDB 3NKS)"
    authors: "Qin, X. et al."
    year: 2011
    journal: "FASEB Journal"
    source_type: pdb_structure
    species_context: human
    evidence_tier: pdb_context_only
    supports:
      - structural_context
      - fad_proximity
      - inhibitor_pocket_proxy
    notes: >
      PDB-first structural reference for PSGE. Inhibitor ACJ is an inhibitor-pocket
      proxy, not direct substrate evidence. Does not by itself prove functional effect.

  - source_id: FOLDX_5_3NKS
    title: "FoldX 5 ΔΔG via BuildModel on repaired protein-only 3NKS"
    source_type: computational_prediction
    species_context: human
    evidence_tier: foldx_stability_prediction
    supports:
      - stability_prediction
    notes: >
      Protein-only FoldX model; FAD/ACJ not included in the FoldX input.
      Computational stability estimate only; not cofactor binding, catalytic activity,
      or clinical outcome.

  - source_id: SASA_BIOPYTHON_3NKS
    title: "Local SASA (BioPython Shrake-Rupley) on 3NKS structural context"
    source_type: computational_prediction
    species_context: human
    evidence_tier: pdb_context_only
    supports:
      - structural_context
      - burial_exposure_context
    notes: >
      Local residue and patch SASA only. WT/mutant deltas reported only when
      structures are comparable (sasa_source_pairing).

  - source_id: MEISSNER_1996_R59W
    title: >
      A R59W mutation in human protoporphyrinogen oxidase results in decreased
      enzyme activity and is prevalent in South Africans with variegate porphyria
    authors: "Meissner, P.N. et al."
    year: 1996
    journal: "Nature Genetics"
    source_type: functional_assay
    species_context: human
    evidence_tier: functional_assay
    variants:
      - R59W
    supports:
      - reduced_enzyme_activity
    claim_text: "R59W leads to reduced PPO enzyme activity in functional assays."
    claim_scope: direct_variant_evidence
    verification_status: bibliography_verified
    notes: >
      Curated from project bibliography/reference notes (07_REFERENCES.md);
      primary-paper verification recommended before external circulation.
      Supports biological relevance of R59W; does not determine PSGE mechanism class.

  - source_id: QIN_2011_R59W_MECHANISTIC
    title: "Structural insight into human variegate porphyria disease"
    authors: "Qin, X. et al."
    year: 2011
    journal: "FASEB Journal"
    source_type: literature
    species_context: human
    evidence_tier: literature_mechanistic
    variants:
      - R59W
    supports:
      - human_ppox_structure
      - fad_environment
      - inhibitor_pocket_proxy
    claim_text: >
      Qin et al. discuss R59W in relation to the FAD binding pocket and propose
      electrostatic hindrance from the bulky tryptophan side chain.
    claim_scope: mechanistic_inference
    verification_status: bibliography_verified
    notes: >
      Curated from project bibliography/reference notes (07_REFERENCES.md);
      primary-paper verification recommended before external circulation.
      Mechanistic interpretation from literature; separate from PSGE-computed proximity
      and FoldX predictions. Not a substitute for direct functional assay.
